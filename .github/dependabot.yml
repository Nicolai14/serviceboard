version: 2
updates:
  # PHP / Composer dependencies
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      php-minor-and-patch:
        update-types:
          - minor
          - patch

  # JS / npm dependencies
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      js-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
