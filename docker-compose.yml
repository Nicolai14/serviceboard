services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: serviceboard_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    networks:
      - serviceboard

  nginx:
    image: nginx:1.27-alpine
    container_name: serviceboard_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - serviceboard

  mysql:
    image: mysql:8.4
    container_name: serviceboard_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-serviceboard}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-serviceboard}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - serviceboard

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: serviceboard_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --queue=monitoring,default --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      - mysql
      - redis
    networks:
      - serviceboard

  redis:
    image: redis:7-alpine
    container_name: serviceboard_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - serviceboard

networks:
  serviceboard:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
